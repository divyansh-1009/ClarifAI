<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error - Assessment Generation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .error-container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        max-width: 600px;
        width: 100%;
      }

      .error-icon {
        text-align: center;
        font-size: 64px;
        color: #f44336;
        margin-bottom: 20px;
      }

      h1 {
        color: #333;
        text-align: center;
        margin-bottom: 20px;
      }

      .error-message {
        background: #fff3f3;
        border-left: 4px solid #f44336;
        padding: 15px;
        margin: 20px 0;
        color: #d32f2f;
        word-wrap: break-word;
      }

      .raw-data {
        background: #f5f5f5;
        border: 1px solid #ddd;
        padding: 15px;
        margin: 20px 0;
        max-height: 300px;
        overflow-y: auto;
        font-family: monospace;
        font-size: 12px;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      .back-button {
        display: block;
        width: 100%;
        padding: 15px;
        background: #2196f3;
        color: white;
        text-align: center;
        text-decoration: none;
        border-radius: 5px;
        margin-top: 20px;
        font-size: 16px;
        transition: background 0.3s;
      }

      .back-button:hover {
        background: #1976d2;
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <div class="error-icon">⚠️</div>
      <h1>Assessment Generation Failed</h1>

      <div class="error-message"><strong>Error:</strong> {{ error }}</div>

      {% if raw_data %}
      <details>
        <summary style="cursor: pointer; font-weight: bold; margin: 20px 0">
          View Raw Response
        </summary>
        <div class="raw-data">{{ raw_data }}</div>
      </details>
      {% endif %}

      <a href="javascript:history.back()" class="back-button">Go Back</a>
    </div>
  </body>
</html>
